version: 2

project_name: ody

builds:
  - id: ody
    main: .
    binary: ody
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

archives:
  - id: ody
    ids:
      - ody
    name_template: "ody_{{.Os}}_{{.Arch}}"
    formats: [tar.gz]

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  use: git
  sort: desc

release:
  draft: false
  prerelease: auto
